name: Deploy to Vercel (prod)

# ЗАПАСНОЙ путь — деплой на Vercel (rnd-vatan.vercel.app). Основной деплой идёт
# на твой сервер (deploy.yml). Этот оставлен на РУЧНОЙ запуск, чтобы не падать на
# каждый push. Нужен секрет VERCEL_TOKEN (https://vercel.com/account/tokens),
# чтобы вернуть авто-запуск — добавь блок push: обратно.
on:
  workflow_dispatch:

concurrency:
  group: vercel-prod
  cancel-in-progress: true

# Не секреты — ID команды и проекта rnd-vatan (служит на rnd-vatan.vercel.app).
env:
  VERCEL_ORG_ID: team_UUKs79jwCekfkwpO1azD40O2
  VERCEL_PROJECT_ID: prj_mA4i3EMj89qWooUOCpLrORqcRDNW

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel prod (source build)
        run: |
          npm i -g vercel@latest
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
