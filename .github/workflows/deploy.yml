name: Build & Deploy to server (renaissancebuilding.uz)

# КАК ТЫ И ХОТЕЛ: каждый push в main → сборка → автозалив по FTP на твой сервер
# (хостинг bp.uztan.ru) в папку домена → сайт сразу обновляется на renaissancebuilding.uz.
#
# Нужно ОДИН раз добавить FTP-доступы в Secrets репозитория
# (Settings → Secrets and variables → Actions → New repository secret):
#   FTP_HOST       — FTP-хост (из панели, раздел FTP; напр. bp.uztan.ru или IP 149.86.227.242)
#   FTP_USERNAME   — FTP-логин
#   FTP_PASSWORD   — FTP-пароль  (вписываешь ТЫ, в поле GitHub; мне не присылай)
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      # Заливаем собранный dist/ по FTP в корень домена. Incremental — шлёт только изменённое.
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ vars.FTP_PORT || 21 }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftp' }}
          local-dir: ./dist/
          # Корень домена на сервере. Если после FTP-входа ты попадаешь НЕ в /www,
          # поменяй это значение на то, что видишь (напр. "renaissancebuilding.uz/"
          # или "./www/renaissancebuilding.uz/"). Можно переопределить переменной
          # репозитория FTP_REMOTE_DIR (Settings → Variables).
          server-dir: ${{ vars.FTP_REMOTE_DIR || '/www/renaissancebuilding.uz/' }}
          # .htaccess (SPA-маршруты) тоже заливается:
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
