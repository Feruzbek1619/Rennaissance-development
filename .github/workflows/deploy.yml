name: Build & Deploy to hosting

# Ручной запуск (вкладка Actions → Run workflow). Авто-деплой идёт через Vercel
# Git-интеграцию; этот FTP-пайплайн оставлен как опция для хостинга bp.uztan.ru —
# чтобы включить авто-запуск на push, верни блок `push:` и добавь FTP-секреты.
on:
  workflow_dispatch:

# Не запускать два деплоя параллельно — отменяем предыдущий.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      # Заливаем содержимое dist/ на хостинг по FTP (incremental — шлёт только изменённое).
      # Все значения берутся из Secrets репозитория (Settings → Secrets and variables → Actions).
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ vars.FTP_PORT || 21 }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftp' }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          # dotfiles (.htaccess) тоже заливаются:
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
